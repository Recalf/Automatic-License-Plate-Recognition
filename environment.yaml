# Conda env: lp
# Recreate: conda env create -f environment.yaml
# CUDA 13.x (pytorch-cuda=13.0). PyTorch 2.10+ required for CUDA 13. For older CUDA use 12.1 or 11.8.
# Recreate: conda env create -f environment.yaml
name: lp
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      # Fix: Paired versions for PyTorch 2.10.0 + CUDA 13.0
      - https://download.pytorch.org/whl/cu130/torch-2.10.0%2Bcu130-cp310-cp310-win_amd64.whl
      - https://download.pytorch.org/whl/cu130/torchvision-0.25.0%2Bcu130-cp310-cp310-win_amd64.whl
      - ultralytics==8.4.21
      - fast-plate-ocr @ git+https://github.com/ankandrew/fast-plate-ocr.git
      - onnxruntime==1.24.3
      - numpy>=1.24,<2.3
      - opencv-python==4.10.0.84
      - protobuf<7
