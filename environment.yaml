# Conda env: lp
# Recreate: conda env create -f environment.yaml
# CUDA 13.x (pytorch-cuda=13.0). PyTorch 2.10+ required for CUDA 13. For older CUDA use 12.1 or 11.8.
name: lp
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pytorch=2.10.0
  - torchvision=0.15.0
  - pytorch-cuda=13.0
  - pip
  - pip:
    - ultralytics==8.4.21
    - fast-plate-ocr==1.0.2
    - mysql-connector-python==9.6.0
    - onnxruntime==1.24.3
    - numpy>=1.24,<2.3
    - opencv-python==4.10.0.84
    - protobuf<7
